<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquor Log & PDCA</title>
    <style>
        /* 全体の雰囲気：高級感のあるダークモード */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #1a1a1a; 
            color: #e0e0e0; 
            padding: 15px;
            margin: 0;
        }

        .container { 
            max-width: 500px; 
            margin: auto; 
        }

        h1 { 
            font-size: 1.5rem;
            color: #d4af37; /* シャンパンゴールド */
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .vision { 
            background: #262626; 
            padding: 15px; 
            border-radius: 8px;
            border-left: 4px solid #d4af37; 
            margin-bottom: 20px; 
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* 入力エリア：スマホで押しやすく */
        .input-area { 
            display: flex; 
            flex-direction: column; /* スマホでは縦並びに */
            gap: 10px; 
            margin-bottom: 25px; 
        }

        input[type="text"] { 
            padding: 15px; 
            border: 1px solid #444; 
            border-radius: 8px; 
            background-color: #333;
            color: white;
            font-size: 1rem;
        }

        button { 
            padding: 15px; 
            background: #d4af37; 
            color: #1a1a1a; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        button:active { 
            background: #b8962d; 
            transform: scale(0.98);
        }

        /* リスト部分 */
        .todo-item { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            background: #262626;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }

        input[type="checkbox"] { 
            margin-right: 15px; 
            transform: scale(1.6); /* チェックボックスを大きく */
        }

        span { flex: 1; }

        .footer { 
            margin-top: 30px; 
            font-size: 0.7rem; 
            color: #666; 
            text-align: center; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LIQUOR LOG & PDCA</h1>
        
        <div class="vision">
            <strong>MY MISSION:</strong><br>
            「売る」から「仕組みを作る」へ。現場を知るエンジニアへの挑戦。
        </div>

        <div class="input-area">
            <input type="text" id="memoInput" placeholder="現場の気づき・学習メモを入力...">
            <button onclick="addMemo()">リストに追加</button>
        </div>

        <div id="todoList">
            <div class="todo-item"><input type="checkbox"> <span>今日の接客の反省を書く</span></div>
            <div class="todo-item"><input type="checkbox"> <span>HTML/CSSの基礎をマスター</span></div>
        </div>

        <div class="footer">
            Liquor Sales Professional x IT Engineer Journey
        </div>
    </div>

    <script>
        function addMemo() {
            const input = document.getElementById('memoInput');
            const text = input.value;
            if (text === "") return;

            const list = document.getElementById('todoList');
            const newItem = document.createElement('div');
            newItem.className = 'todo-item';
            newItem.innerHTML = `<input type="checkbox"> <span>${text}</span>`;
            
            list.prepend(newItem);
            input.value = "";
        }
    </script>
</body>
</html>
