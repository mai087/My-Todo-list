<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Quest Dash</title>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #0f172a; color: #f8fafc; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        
        /* ステータスカード */
        .status-card { 
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px; border-radius: 15px; border: 1px solid #d4af37;
            text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .rank-title { color: #d4af37; font-size: 0.8rem; letter-spacing: 2px; }
        .count-display { font-size: 3rem; font-weight: bold; margin: 10px 0; color: #fff; }
        
        /* プログレスバー */
        .progress-container { background: #475569; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: #d4af37; height: 100%; width: 40%; transition: width 0.5s; }

        /* 入力エリア */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #334155; color: white; }
        .add-btn { background: #d4af37; color: #0f172a; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }

        /* ログ（履歴） */
        .log-item { 
            background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #d4af37;
        }
        .time { font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div class="rank-title">CURRENT RANK: LIQUOR SOMMELIER</div>
            <div class="count-display"><span id="totalCount">0</span> <small style="font-size: 1rem;">件</small></div>
            <div class="progress-container"><div class="progress-bar" id="progressBar" style="width: 0%"></div></div>
            <div style="font-size: 0.8rem; color: #94a3b8;">今月の目標 30件まで あと <span id="remainCount">30</span> 件</div>
        </div>

        <div class="input-group">
            <input type="text" id="memoInput" placeholder="獲得した内容（例：ボジョレー案内）">
            <button class="add-btn" onclick="addAchieve()">＋1</button>
        </div>

        <div id="logList">
            </div>
    </div>

    <script>
    let count = 0;
    const goal = 30;
    // ★ここに控えたURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxjWUQCJZBhSfs3Cez2-vecfwFQUn66zlnipN6gqFVh5HrPsXM6IJHrw1j59-bEvqod/exec";

    window.onload = function() {
        const saved = localStorage.getItem('questData');
        if (saved) {
            const data = JSON.parse(saved);
            count = data.count;
            data.logs.forEach(log => createLogElement(log.text, log.time));
            updateDisplay();
        }
    };

    async function addAchieve() {
        const input = document.getElementById('memoInput');
        const text = input.value || "会員獲得成功！";
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;

        // 1. 画面の表示を更新
        count++;
        createLogElement(text, timeStr);
        updateDisplay();
        saveData();

        // 2. ★スプレッドシート（GAS）にデータを飛ばす魔法
        try {
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ text: text, time: timeStr })
            });
            console.log("スプレッドシートへの送信成功！");
        } catch (e) {
            console.error("送信エラー:", e);
        }

        input.value = "";
    }

    function createLogElement(text, time) {
        const list = document.getElementById('logList');
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<span>${text}</span><span class="time">${time}</span>`;
        list.prepend(item);
    }

    function updateDisplay() {
        document.getElementById('totalCount').innerText = count;
        document.getElementById('remainCount').innerText = Math.max(0, goal - count);
        const percent = Math.min(100, (count / goal) * 100);
        document.getElementById('progressBar').style.width = percent + "%";
    }

    function saveData() {
        const logs = [];
        document.querySelectorAll('.log-item').forEach(item => {
            logs.push({
                text: item.querySelector('span').innerText,
                time: item.querySelector('.time').innerText
            });
        });
        localStorage.setItem('questData', JSON.stringify({ count, logs }));
    }
</script>
</body>
</html>
