<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquor Log & PDCA</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1a1a; color: #e0e0e0; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        h1 { font-size: 1.5rem; color: #d4af37; text-align: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .vision { background: #262626; padding: 15px; border-radius: 8px; border-left: 4px solid #d4af37; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.5; }
        .input-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { padding: 15px; border: 1px solid #444; border-radius: 8px; background-color: #333; color: white; font-size: 1rem; }
        button { padding: 15px; background: #d4af37; color: #1a1a1a; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .todo-item { display: flex; align-items: center; padding: 15px; background: #262626; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        input[type="checkbox"] { margin-right: 15px; transform: scale(1.6); }
        .delete-btn { margin-left: auto; background: none; border: 1px solid #555; color: #888; padding: 5px 10px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LIQUOR LOG & PDCA</h1>
        <div class="vision">
            <strong>MY MISSION:</strong><br>
            データを保存して、本物のツールへ。
        </div>

        <div class="input-area">
            <input type="text" id="memoInput" placeholder="メモを入力...">
            <button onclick="addMemo()">リストに追加</button>
        </div>

        <div id="todoList">
            </div>
    </div>

    <script>
        // 1. ページを開いた時に、保存されているデータを読み込む
        window.onload = function() {
            const savedData = localStorage.getItem('myMemos');
            if (savedData) {
                const memos = JSON.parse(savedData);
                memos.forEach(text => createTodoElement(text));
            }
        };

        function addMemo() {
            const input = document.getElementById('memoInput');
            const text = input.value;
            if (text === "") return;

            createTodoElement(text); // 画面に表示
            saveData();             // データを保存
            input.value = "";
        }

        // 画面にリストを作る共通の仕組み
        function createTodoElement(text) {
            const list = document.getElementById('todoList');
            const newItem = document.createElement('div');
            newItem.className = 'todo-item';
            newItem.innerHTML = `
                <input type="checkbox">
                <span>${text}</span>
                <button class="delete-btn" onclick="deleteMemo(this)">削除</button>
            `;
            list.prepend(newItem);
        }

        // 2. データをLocalStorageに保存する魔法
        function saveData() {
            const listItems = document.querySelectorAll('.todo-item span');
            const memos = [];
            listItems.forEach(item => memos.push(item.innerText));
            localStorage.setItem('myMemos', JSON.stringify(memos));
        }

        // 3. 削除する仕組み
        function deleteMemo(btn) {
            btn.parentElement.remove();
            saveData(); // 削除した後の状態で保存し直す
        }
    </script>
</body>
</html>
